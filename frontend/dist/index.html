<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧩 OpenCode 工作台</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/marked.min.js"></script>
</head>
<body>
    <!-- ======== 顶部导航栏 ======== -->
    <header class="header">
        <h1 class="app-title">🧩 OpenCode 工作台</h1>
        <div class="header-right">
            <button class="btn btn-theme" id="btnTheme" title="切换主题">🌙</button>
        </div>
    </header>

    <!-- ======== 主布局 ======== -->
    <div class="main-layout">
        <!-- 侧边栏 -->
        <nav class="sidebar" id="sidebar">
            <div class="nav-item active" data-view="view-opencode">
                <span class="nav-icon">📂</span>
                <span class="nav-label">工作区</span>
            </div>
            <div class="nav-item" data-view="view-providers">
                <span class="nav-icon">🔌</span>
                <span class="nav-label">供应商配置</span>
            </div>
            <div class="nav-item" data-view="view-omo">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">OMO 配置</span>
            </div>
            <div class="nav-item" data-view="view-skills">
                <span class="nav-icon">🔗</span>
                <span class="nav-label">技能管理</span>
            </div>
            <div class="nav-item" data-view="view-commands">
                <span class="nav-icon">📋</span>
                <span class="nav-label">常用命令</span>
            </div>
        </nav>

        <!-- 内容区域 -->
        <div class="content-area" id="contentArea">

            <!-- ===== View 1: 工作区 ===== -->
            <div class="view-panel active" id="view-opencode">
                <!-- 控制栏 -->
                <div class="oc-toolbar">
                    <button class="btn btn-proxy" id="btnProxySettings" title="网络配置">🌐 网络配置</button>
                    <button class="btn btn-primary" id="btnStartWeb">▶ 启动 OpenCode</button>
                    <button class="btn btn-danger-outline" id="btnStopWeb" disabled>■ 停止</button>
                    <div class="oc-toolbar-right">
                        <button class="btn btn-config" id="btnWtOpen" disabled>🖥 在终端中打开</button>
                    </div>
                </div>
                <!-- 自研轻量客户端 -->
                <div class="oc-client" id="webContainer">
                    <button class="oc-toggle-btn oc-toggle-left" id="btnToggleSessions" title="隐藏会话栏">◀</button>
                    <aside class="oc-sessions" id="ocSessions">
                        <div class="oc-panel-head">
                            <span>项目树</span>
                            <button class="btn btn-sm btn-refresh" id="btnRefreshTree" disabled>刷新</button>
                        </div>
                        <div class="oc-tree" id="ocTree">
                            <div class="oc-empty">启动服务后加载项目树</div>
                        </div>
                        <div class="oc-sessions-footer">
                            <button class="btn btn-primary" id="btnNewSession" disabled>＋ 新建会话</button>
                        </div>
                    </aside>
                    <main class="oc-chat">
                        <div class="oc-chat-head" id="ocChatTitle">未选择会话</div>
                        <div class="oc-search-bar" id="ocSearchBar" style="display:none">
                            <input type="text" id="ocSearchInput" placeholder="搜索当前会话消息..." />
                            <span class="oc-search-count" id="ocSearchCount"></span>
                            <button class="btn btn-sm" id="ocSearchPrev" disabled>▲</button>
                            <button class="btn btn-sm" id="ocSearchNext" disabled>▼</button>
                            <button class="btn btn-sm" id="ocSearchClose">×</button>
                        </div>
                        <div class="oc-messages-wrap">
                            <div class="oc-messages" id="ocMessages">
                                <div class="oc-empty">选择会话后查看消息，或输入内容创建新会话</div>
                            </div>
                            <button class="oc-scroll-bottom" id="btnScrollBottom" title="回到会话底部">↓</button>
                        </div>
                        <div class="oc-model-info" id="ocModelInfo">
                            <span class="oc-select-icon">🤖</span>
                            <select class="oc-model-select" id="ocAgentSelect">
                                <option value="">默认</option>
                            </select>
                            <span class="oc-select-icon">🧠</span>
                            <select class="oc-model-select" id="ocModelSelect">
                                <option value="">默认</option>
                            </select>
                        </div>
                        <div class="oc-attach-list" id="ocAttachList"></div>
                        <div class="oc-input-bar">
                            <div class="oc-cmd-palette" id="ocCmdPalette" style="display:none">
                                <div class="oc-cmd-palette-scroll"></div>
                            </div>
                            <div class="oc-input-wrap">
                                <textarea id="ocPrompt" placeholder="输入内容，Enter 发送，Ctrl+Enter 换行" disabled></textarea>
                                <div class="oc-input-actions">
                                    <button class="oc-attach-btn" id="btnAttachFile" disabled title="附件">📎</button>
                                    <button class="btn btn-primary" id="btnSendPrompt" disabled>发送</button>
                                </div>
                            </div>
                        </div>
                    </main>
                    <button class="oc-toggle-btn oc-toggle-right" id="btnToggleSidepanel" title="隐藏信息栏">▶</button>
                    <aside class="oc-sidepanel">
                        <div class="oc-panel-section">
                            <div class="oc-panel-head" role="button" tabindex="0">
                                <span class="oc-panel-arrow">▼</span><span>服务状态</span>
                                <button class="btn btn-sm btn-refresh" id="btnRefreshStatus" disabled>刷新</button>
                            </div>
                            <div class="oc-panel-body">
                                <div class="oc-services" id="ocServices">
                                    <div class="oc-empty">启动服务后查看</div>
                                </div>
                            </div>
                        </div>
                        <div class="oc-panel-section">
                            <div class="oc-panel-head" role="button" tabindex="0">
                                <span class="oc-panel-arrow">▼</span><span>代办事项</span>
                            </div>
                            <div class="oc-panel-body">
                                <div class="oc-todos" id="ocTodos">
                                    <div class="oc-empty">会话中暂无代办</div>
                                </div>
                            </div>
                        </div>
                        <div class="oc-panel-section grow">
                            <div class="oc-panel-head" role="button" tabindex="0">
                                <span class="oc-panel-arrow">▼</span><span>修改</span>
                                <button class="btn btn-sm btn-refresh" id="btnLoadDiff" disabled>刷新</button>
                            </div>
                            <div class="oc-panel-body">
                                <div class="oc-diff" id="ocDiff">
                                    <div class="oc-empty">选择会话后查看变更</div>
                                </div>
                            </div>
                        </div>
                        <div class="oc-dir-bar" id="ocDirBar">
                            <span class="oc-dir-bar-icon">📂</span>
                            <span class="oc-dir-bar-path" id="ocSideDirPath" title="">--</span>
                        </div>
                    </aside>
                </div>
            </div>

            <!-- ===== View 2: OMO 配置 ===== -->
            <div class="view-panel" id="view-omo">
                <section class="path-bar">
                    <span class="path-label">配置文件：</span>
                    <span class="path-value" id="configPath">加载中...</span>
                    <button class="btn btn-sm btn-refresh" id="btnRefreshModels">🔄 刷新列表</button>
                </section>

                <div class="model-list" id="modelConfig">
                    <div class="loading"><div class="spinner"></div><p>正在加载 OMO 配置...</p></div>
                </div>

                <div class="model-actions" id="modelActions" style="display:none">
                    <button class="btn btn-sm btn-add-type" id="btnAddModelType">➕ 添加类型</button>
                    <button class="btn btn-primary btn-save" id="btnSaveModels">💾 保存</button>
                    <span class="save-status" id="saveStatus"></span>
                </div>
            </div>

            <!-- ===== View 3: 技能管理 ===== -->
            <div class="view-panel" id="view-skills">
                <!-- 统计栏 -->
                <section class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-value" id="statGlobal">0</span>
                        <span class="stat-label">全局技能</span>
                    </div>
                    <div class="stats-spacer"></div>
                    <button class="btn btn-sm btn-refresh" id="btnRefresh" title="刷新技能列表">🔄 刷新</button>
                </section>

                <!-- 源路径 -->
                <section class="path-bar">
                    <span class="path-label">全局目录：</span>
                    <span class="path-value" id="sourcePath">加载中...</span>
                    <button class="btn btn-sm btn-open" id="btnOpenDir" title="在资源管理器中打开">📂 打开</button>
                </section>

                <!-- 搜索栏 -->
                <section class="path-bar">
                    <span class="path-label">搜索：</span>
                    <input type="text" id="skillSearch" placeholder="输入技能名称过滤..." style="flex:1;padding:4px 8px;" />
                </section>

                <!-- 技能列表 -->
                <main class="skill-list" id="skillList">
                    <div class="loading"><div class="spinner"></div><p>正在加载技能列表...</p></div>
                </main>
            </div>

            <!-- ===== View 4: 常用命令 ===== -->
            <div class="view-panel" id="view-commands">
                <div class="cmd-tabs">
                    <button class="cmd-tab active" data-cmd-tab="cli">CLI 命令</button>
                    <button class="cmd-tab" data-cmd-tab="tui">TUI 命令</button>
                </div>
                <div class="cmd-content" id="cmdContent">
                    <div class="loading"><div class="spinner"></div><p>正在加载命令列表...</p></div>
                </div>
            </div>

            <!-- ===== View 5: 供应商配置 ===== -->
            <div class="view-panel" id="view-providers">
                <section class="path-bar">
                    <span class="path-label">配置文件：</span>
                    <span class="path-value" id="providerConfigPath">加载中...</span>
                </section>
                <div class="providers-list" id="providersList">
                    <div class="loading"><div class="spinner"></div><p>正在加载供应商...</p></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <!-- 配置弹窗 -->
    <div class="modal-overlay" id="proxyModal" style="display:none">
        <div class="modal proxy-modal">
            <h3>网络配置</h3>
            <div class="oc-service-group-title" style="margin-bottom:10px">OpenCode 服务地址</div>
            <div class="modal-field">
                <label for="serviceHost">服务地址</label>
                <input id="serviceHost" placeholder="127.0.0.1" />
            </div>
            <div class="modal-field">
                <label for="servicePort">服务端口</label>
                <input id="servicePort" inputmode="numeric" placeholder="4096" />
            </div>
            <hr class="proxy-separator" />
            <div class="oc-service-group-title" style="margin-bottom:10px">代理设置</div>
            <label class="proxy-switch-row">
                <span>
                    <strong>启用代理</strong>
                    <small>启动 OpenCode 前注入代理环境变量</small>
                </span>
                <input type="checkbox" id="proxyEnabled" />
            </label>
            <div class="modal-field">
                <label for="proxyHost">代理地址</label>
                <input id="proxyHost" placeholder="127.0.0.1" />
            </div>
            <div class="modal-field">
                <label for="proxyPort">代理端口</label>
                <input id="proxyPort" inputmode="numeric" placeholder="7897" />
            </div>
            <div class="proxy-preview" id="proxyPreview"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelProxy">取消</button>
                <button class="btn btn-primary" id="btnSaveProxy">保存</button>
            </div>
        </div>
    </div>

    <!-- 技能预览/编辑 Modal -->
    <div class="modal-overlay" id="skillModal" style="display:none">
        <div class="modal skill-modal">
            <div class="modal-header">
                <h3 id="skillModalTitle">技能名称</h3>
                <div class="modal-header-actions">
                    <button class="btn btn-sm" id="skillModalEdit">编辑</button>
                    <button class="btn btn-sm btn-primary" id="skillModalSave" style="display:none">保存</button>
                    <button class="btn btn-sm btn-cancel" id="skillModalCancel" style="display:none">取消</button>
                    <button class="btn btn-sm" id="skillModalClose">×</button>
                </div>
            </div>
            <div class="modal-body" id="skillModalBody"></div>
        </div>
    </div>

    <input type="file" id="ocFileInput" multiple hidden />

    <!-- Wails v3 绑定桥接：导入生成绑定并挂到 window -->
    <script type="module">
        import { App } from './bindings/oc-manager/index.js';
        window.wailsBindings = { App };
    </script>

    <!-- 模块化 JS，按依赖顺序加载 -->
    <script src="/theme.js"></script>
    <script src="/utils.js"></script>
    <script src="/api-mock.js"></script>
    <script src="/utils.js"></script>
    <script src="/api-mock.js"></script>
    <script src="/navigation.js"></script>
    <script src="/chat.js"></script>
    <script src="/command-palette.js"></script>
    <script src="/omo-config.js"></script>
    <script src="/skill-manager.js"></script>
    <script src="/commands-view.js"></script>
    <script src="/provider-view.js"></script>
    <script src="/main.js"></script>
</body>
</html>
